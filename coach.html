<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Melba Coach — Your Intimacy Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF0EC;
    --primary: #5151F7;
    --primary-light: #EEEEFF;
    --text-dark: #1A1040;
    --text-mid: #6B6B8A;
    --text-light: #A0A0BC;
    --border: #EAE0F2;
    --coach-bg: #F7F4FF;
    --coach-border: #D4CAFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #D6C8BF; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; font-family: 'DM Sans', sans-serif; padding: 20px 0 40px; }
  .phone { width: 390px; min-height: 844px; background: var(--coach-bg); border-radius: 44px; overflow: hidden; position: relative; box-shadow: 0 32px 80px rgba(0,0,0,0.28); display: flex; flex-direction: column; }

  /* ── Coach Header ── */
  .coach-header { padding: 52px 20px 14px; background: var(--coach-bg); border-bottom: 1.5px solid var(--coach-border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .coach-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #5151F7, #9B7BE8); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .coach-header-info { flex: 1; }
  .coach-header-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: 15px; font-weight: 800; color: var(--primary); }
  .coach-header-sub { font-size: 11px; color: var(--text-mid); margin-top: 1px; }

  /* ── Chat area ── */
  .coach-chat { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 3px; background: var(--coach-bg); scroll-behavior: smooth; }
  .coach-chat::-webkit-scrollbar { display: none; }
  .coach-spacer { flex: 1; min-height: 0; }

  /* ── Bubbles ── */
  .coach-bubble-row { display: flex; align-items: flex-end; gap: 8px; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; margin-bottom: 2px; }
  .coach-bubble-row.show { opacity: 1; transform: translateY(0); }
  .coach-bubble-row.user-row { justify-content: flex-end; }
  .coach-mini-av { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #5151F7, #9B7BE8); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .coach-bubble { max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .coach-melba-bubble { background: #fff; color: var(--text-dark); border-bottom-left-radius: 5px; box-shadow: 0 1px 8px rgba(81,81,247,0.10); }
  .coach-user-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 5px; }

  /* ── Typing indicator ── */
  .coach-typing-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 2px; opacity: 0; transition: opacity 0.2s; }
  .coach-typing-row.show { opacity: 1; }
  .coach-typing-bubble { background: #fff; border-radius: 16px; border-bottom-left-radius: 5px; padding: 12px 14px; box-shadow: 0 1px 8px rgba(81,81,247,0.10); display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--coach-border); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* ── Prompt chips ── */
  .coach-prompts { padding: 6px 16px 0; display: flex; flex-wrap: wrap; gap: 6px; background: var(--coach-bg); }
  .coach-prompt-chip { padding: 7px 13px; background: #fff; border: 1.5px solid var(--coach-border); border-radius: 100px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--primary); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .coach-prompt-chip:active { transform: scale(0.96); background: var(--primary-light); }

  /* ── Input area ── */
  .coach-input-area { flex-shrink: 0; padding: 10px 16px 38px; background: var(--coach-bg); border-top: 1.5px solid var(--coach-border); display: flex; align-items: center; gap: 10px; }
  .coach-text-input { flex: 1; padding: 11px 15px; background: #fff; border: 1.5px solid var(--coach-border); border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark); outline: none; transition: border-color 0.2s; }
  .coach-text-input:focus { border-color: var(--primary); }
  .coach-text-input::placeholder { color: var(--text-light); }
  .coach-send-btn { width: 40px; height: 40px; background: var(--primary); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.2s; opacity: 0.35; pointer-events: none; }
  .coach-send-btn.active { opacity: 1; pointer-events: all; }
  .coach-send-btn:active { transform: scale(0.92); }
  .coach-send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* ── Privacy note ── */
  .privacy-note { text-align: center; font-size: 10.5px; color: var(--text-light); padding: 0 20px 6px; background: var(--coach-bg); }
</style>
</head>
<body>
<div class="phone">
  <div class="coach-header">
    <div class="coach-avatar">✨</div>
    <div class="coach-header-info">
      <div class="coach-header-name">Melba Coach</div>
      <div class="coach-header-sub">Your intimacy guide · science-backed · completely private</div>
    </div>
  </div>

  <div class="coach-chat" id="coachChat"><div class="coach-spacer"></div></div>
  <div class="coach-prompts" id="coachPrompts"></div>
  <div class="privacy-note">Everything you share stays private. Melba is an AI guide, not a therapist.</div>
  <div class="coach-input-area">
    <input class="coach-text-input" id="coachInput" placeholder="Ask Melba anything…" oninput="onCoachType()" onkeydown="onCoachKey(event)" />
    <button class="coach-send-btn" id="coachSendBtn" onclick="sendCoachMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const coachChatEl  = document.getElementById("coachChat");
const coachInput   = document.getElementById("coachInput");
const coachSendBtn = document.getElementById("coachSendBtn");
const coachPromptsEl = document.getElementById("coachPrompts");

let coachHistory = [];
let coachLocked  = false;

const OPENING_PROMPTS = [
  "How do I bring my partner to Melba?",
  "I want to explore something new",
  "I feel disconnected lately",
  "How do I bring something up with my partner?",
  "I'm curious about my desires",
];

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollDown() {
  requestAnimationFrame(() => { coachChatEl.scrollTop = coachChatEl.scrollHeight; });
}

function addMelba(text) {
  const row = document.createElement("div");
  row.className = "coach-bubble-row";
  row.innerHTML = `<div class="coach-mini-av">✨</div><div class="coach-bubble coach-melba-bubble">${text}</div>`;
  coachChatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add("show")));
  scrollDown();
}

function addUser(text) {
  const row = document.createElement("div");
  row.className = "coach-bubble-row user-row";
  row.innerHTML = `<div class="coach-bubble coach-user-bubble">${text}</div>`;
  coachChatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add("show")));
  scrollDown();
}

let typingRow = null;
function showTyping() {
  typingRow = document.createElement("div");
  typingRow.className = "coach-typing-row";
  typingRow.innerHTML = `<div class="coach-mini-av">✨</div><div class="coach-typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  coachChatEl.appendChild(typingRow);
  requestAnimationFrame(() => requestAnimationFrame(() => typingRow.classList.add("show")));
  scrollDown();
}
function removeTyping() { if (typingRow) { typingRow.remove(); typingRow = null; } }

function showPrompts(prompts) {
  coachPromptsEl.innerHTML = "";
  prompts.forEach(p => {
    const c = document.createElement("button");
    c.className = "coach-prompt-chip";
    c.textContent = p;
    c.onclick = () => {
      coachPromptsEl.innerHTML = "";
      coachInput.value = p;
      coachSendBtn.classList.add("active");
      sendCoachMessage();
    };
    coachPromptsEl.appendChild(c);
  });
}

async function initCoach() {
  showTyping();
  await delay(900);
  removeTyping();
  const opening = "Hey 🍑 I'm Melba, your personal intimacy guide. What's on your mind today?";
  addMelba(opening);
  coachHistory.push({ role: "assistant", content: opening });
  showPrompts(OPENING_PROMPTS);
}

async function sendCoachMessage() {
  const text = coachInput.value.trim();
  if (!text || coachLocked) return;
  coachLocked = true;
  coachPromptsEl.innerHTML = "";
  coachInput.value = "";
  coachSendBtn.classList.remove("active");

  addUser(text);
  coachHistory.push({ role: "user", content: text });
  showTyping();

  try {
    const res = await fetch("/.netlify/functions/coach", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: coachHistory,
        userContext: { isDual: false, solo: true },
      }),
    });
    const data = await res.json();
    removeTyping();
    if (data.reply) {
      addMelba(data.reply);
      coachHistory.push({ role: "assistant", content: data.reply });
      if (data.chips && data.chips.length) showPrompts(data.chips);
    } else {
      addMelba("Something went wrong, please try again 🙏");
    }
  } catch (err) {
    removeTyping();
    addMelba("Something went wrong, please try again 🙏");
  }

  coachLocked = false;
}

function onCoachType() {
  coachSendBtn.classList.toggle("active", coachInput.value.trim().length > 0);
}

function onCoachKey(e) {
  if (e.key === "Enter" && coachInput.value.trim()) sendCoachMessage();
}

// Boot
initCoach();
</script>
</body>
</html>
